{% extends "base.html" %}

{% block title %}Login - Elite Academy{% endblock %}

{% block content %}
<style>
    .auth-container {
        min-height: calc(100vh - 300px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .auth-form {
        background: white;
        padding: 50px 40px;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        max-width: 450px;
        width: 100%;
        animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .auth-form h2 {
        text-align: center;
        margin-bottom: 10px;
        color: #1e3c72;
    }

    .form-subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
        font-size: 0.95rem;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #2c3e50;
        font-weight: 600;
        font-size: 0.95rem;
    }

    .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-group input:focus {
        outline: none;
        border-color: #1e3c72;
        box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.1);
    }

    .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        font-size: 0.9rem;
    }

    .remember-forgot a {
        color: #1e3c72;
        text-decoration: none;
        font-weight: 500;
    }

    .remember-forgot a:hover {
        text-decoration: underline;
    }

    .form-group input[type="checkbox"] {
        width: auto;
        margin-right: 5px;
    }

    .btn-login {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(30, 60, 114, 0.3);
    }

    .signup-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
    }

    .signup-link a {
        color: #1e3c72;
        font-weight: 600;
        text-decoration: none;
    }

    .signup-link a:hover {
        text-decoration: underline;
    }
</style>

<div class="auth-container">
    <div class="auth-form">
        <h2>Welcome Back</h2>
        <p class="form-subtitle">Log in to your account</p>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="remember-forgot">
                <label style="display: flex; align-items: center;">
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login">Log In</button>
        </form>

        <p class="signup-link">
            Don't have an account? <a href="/signup">Sign up here</a>
        </p>
    </div>
</div>
{% endblock %}
