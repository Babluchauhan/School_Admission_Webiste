{% extends "base.html" %}

{% block title %}Admission Form - Elite Academy{% endblock %}

{% block content %}
<style>
    .admission-container {
        min-height: 100vh;
        padding: 60px 20px;
        background: linear-gradient(135deg, #f8f9fa, #e8eef5);
    }

    .admission-wrapper {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        padding: 50px 40px;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .admission-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .admission-header h2 {
        color: #1e3c72;
        margin-bottom: 10px;
    }

    .admission-header p {
        color: #666;
        font-size: 1.05rem;
    }

    .form-section-title {
        color: #1e3c72;
        border-bottom: 2px solid #ff9a00;
        padding-bottom: 10px;
        margin-top: 30px;
        margin-bottom: 20px;
        font-size: 1.2rem;
        font-weight: 600;
    }

    .form-section-title:first-of-type {
        margin-top: 0;
    }

    .form-group {
        margin-bottom: 25px;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .form-row.full {
        grid-template-columns: 1fr;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #2c3e50;
        font-weight: 600;
        font-size: 0.95rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        font-family: inherit;
        transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #1e3c72;
        box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.1);
    }

    .form-group textarea {
        resize: vertical;
        min-height: 100px;
    }

    .form-group small {
        display: block;
        margin-top: 5px;
        color: #999;
        font-size: 0.85rem;
    }

    .checkbox-group,
    .radio-group {
        margin-top: 10px;
    }

    .checkbox-item,
    .radio-item {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
    }

    .checkbox-item input,
    .radio-item input {
        width: auto;
        margin-right: 10px;
    }

    .file-input-wrapper {
        position: relative;
        display: inline-block;
        width: 100%;
    }

    .file-input-wrapper input[type="file"] {
        display: none;
    }

    .file-input-label {
        display: block;
        padding: 15px;
        background: #f8f9fa;
        border: 2px dashed #1e3c72;
        border-radius: 8px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        color: #1e3c72;
        font-weight: 500;
    }

    .file-input-label:hover {
        background: #e8eef5;
        border-color: #2a5298;
    }

    .form-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 40px;
    }

    .btn-submit {
        padding: 14px 30px;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(30, 60, 114, 0.3);
    }

    .btn-reset {
        padding: 14px 30px;
        background: #e0e0e0;
        color: #2c3e50;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-reset:hover {
        background: #d0d0d0;
    }

    .required {
        color: #ff6b6b;
        margin-left: 3px;
    }

    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }

        .form-buttons {
            grid-template-columns: 1fr;
        }

        .admission-wrapper {
            padding: 30px 20px;
        }
    }

    @media (max-width: 480px) {
        .admission-container {
            padding: 30px 10px;
        }

        .admission-wrapper {
            padding: 20px 15px;
        }

        .admission-header h2 {
            font-size: 1.8rem;
        }
    }
</style>
